<script>
// Tweaks wiring
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#4f72e8",
  "warnThreshold": 90,
  "fontSize": 16
}/*EDITMODE-END*/;
let tweakState = {...window.TWEAK_DEFAULTS};

function applyTweaks(t) {
  document.documentElement.style.setProperty('--accent', t.accentColor);
  document.documentElement.style.fontSize = t.fontSize + 'px';
  window.__warnThreshold = t.warnThreshold;
  document.getElementById('tw-accent').value = t.accentColor;
  document.getElementById('tw-warn').value = t.warnThreshold;
  document.getElementById('tw-warn-val').textContent = t.warnThreshold + '%';
  document.getElementById('tw-font').value = t.fontSize;
  document.getElementById('tw-font-val').textContent = t.fontSize;
}
applyTweaks(tweakState);

document.getElementById('tw-accent').addEventListener('input', e => {
  tweakState.accentColor = e.target.value;
  applyTweaks(tweakState);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweakState}, '*');
});
document.getElementById('tw-warn').addEventListener('input', e => {
  tweakState.warnThreshold = +e.target.value;
  applyTweaks(tweakState);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweakState}, '*');
});
document.getElementById('tw-font').addEventListener('input', e => {
  tweakState.fontSize = +e.target.value;
  applyTweaks(tweakState);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweakState}, '*');
});

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({type: '__edit_mode_available'}, '*');
</script>

const STORAGE_KEY = 'spending-app-v1';
const THEME_KEY   = 'spending-theme';
const MONTH_KEY   = 'spending-month';
const SYNC_KEY    = 'spending-sync-url';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { categories: SEED_CATEGORIES, entries: {} };
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function mkKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function sumEntries(arr) { return (arr||[]).reduce((s,e)=>s+e.amount,0); }
const fmt = n => `€${n.toFixed(2)}`;
const fmtAbs = n => `€${Math.abs(n).toFixed(2)}`;

// ─── Shared UI primitives ──────────────────────────────────────

function ProgressBar({ pct, color, warn }) {
  const w = window.__warnThreshold || 80;
  const clr = pct >= 100 ? 'var(--danger)' : pct >= w ? 'var(--warning)' : (color || 'var(--accent)');

}

function Modal({ title, onClose, children, width=400 }) {

  return <button {...props} style={{...base,...v[variant]}}>{children}</button>;
}

// ─── Donut chart ───────────────────────────────────────────────
function DonutChart({ categories, monthEntries }) {
  const ref = useRef();
  const [theme, setTheme] = useState(document.documentElement.dataset.theme);
  useEffect(()=>{
    const ob = new MutationObserver(()=>setTheme(document.documentElement.dataset.theme));
    ob.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    return ()=>ob.disconnect();
  },[]);

  const data = categories.map(c=>({
    name: c.name, color: PALETTE[c.ci % PALETTE.length],
    spent: sumEntries(monthEntries[c.id]),
  })).filter(d=>d.spent>0).sort((a,b)=>b.spent-a.spent);

  const total = data.reduce((s,d)=>s+d.spent, 0);
  const top = data.slice(0,8);

  useEffect(()=>{
    const canvas = ref.current; if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const S = canvas.width; const cx=S/2, cy=S/2;
    const outer=S/2-6, inner=outer*.62;
    ctx.clearRect(0,0,S,S);
    if(!top.length){ ctx.fillStyle='var(--border)'; ctx.beginPath(); ctx.arc(cx,cy,outer,0,2*Math.PI); ctx.fill(); ctx.fillStyle=theme==='dark'?'#1e2535':'#ffffff'; ctx.beginPath(); ctx.arc(cx,cy,inner,0,2*Math.PI); ctx.fill(); return; }
    let angle = -Math.PI/2;
    for(const d of top){
      const sweep = (d.spent/total)*2*Math.PI;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,outer,angle,angle+sweep); ctx.closePath();
      ctx.fillStyle=d.color; ctx.fill(); angle+=sweep;
    }
    ctx.beginPath(); ctx.arc(cx,cy,inner,0,2*Math.PI);
    ctx.fillStyle = theme==='dark' ? '#1e2535' : '#ffffff'; ctx.fill();
    ctx.fillStyle='var(--text)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`700 15px DM Sans,sans-serif`; ctx.fillText(fmt(total),cx,cy-8);
    ctx.font=`400 11px DM Sans,sans-serif`; ctx.fillStyle='var(--text2)'; ctx.fillText('spent',cx,cy+9);
  },[top, total, theme]);

  return (
    <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
      <canvas ref={ref} width={160} height={160} style={{flexShrink:0}}/>
      {top.length===0
        ? <span style={{fontSize:13,color:'var(--text2)'}}>No spending recorded this month</span>
        : <div style={{flex:1,minWidth:140}}>
            {top.map(d=>(
              <div key={d.name} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                <div style={{width:9,height:9,borderRadius:3,background:d.color,flexShrink:0}}/>
                <span style={{fontSize:12,color:'var(--text2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                <span style={{fontSize:12,fontWeight:600}}>{fmt(d.spent)}</span>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

// ─── Category Detail ───────────────────────────────────────────
function CategoryDetail({ cat, entries, onBack, onAddEntry, onDeleteEntry, onUpdateBudget, onToggleFixed }) {
  const [addOpen, setAddOpen] = useState(false);
  const [budgetOpen, setBudgetOpen] = useState(false);
  const [place, setPlace] = useState('');
  const [amount, setAmount] = useState('');
  const [newBudget, setNewBudget] = useState(String(cat.budget));
  const color = PALETTE[cat.ci % PALETTE.length];
  const spent = sumEntries(entries);
  const pct = cat.budget > 0 ? (spent/cat.budget)*100 : 0;
  const remaining = cat.budget - spent;
  const w = window.__warnThreshold || 80;

  const handleAdd = () => {
    const a = parseFloat(amount);
    if (!place.trim() || isNaN(a) || a <= 0) return;
    onAddEntry({ id: Date.now(), place: place.trim(), amount: a, date: new Date().toISOString().slice(0,10) });
    setPlace(''); setAmount(''); setAddOpen(false);
  };

  const handleBudget = () => {
    const b = parseFloat(newBudget);
    if (!isNaN(b) && b >= 0) onUpdateBudget(cat.id, b);
    setBudgetOpen(false);
  };

  const statusColor = pct >= 100 ? 'var(--danger)' : pct >= w ? 'var(--warning)' : color;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* Header */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'14px 18px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10,boxShadow:'var(--shadow)'}}>
        <button onClick={onBack} style={{background:'none',border:'1.5px solid var(--border)',borderRadius:8,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text)',fontSize:16,flexShrink:0}}>‹</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <h2 style={{fontSize:17,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.name}</h2>
            {cat.isFixed && (
              <span onClick={()=>onToggleFixed(cat.id)} title="Fixed – click to toggle" style={{fontSize:11,background:'var(--bg2)',color:'var(--text2)',padding:'2px 8px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',userSelect:'none',flexShrink:0}}>🔒 Fixed</span>
            )}
            {!cat.isFixed && (
              <span onClick={()=>onToggleFixed(cat.id)} title="Variable – click to mark fixed" style={{fontSize:11,color:'var(--text2)',padding:'2px 8px',borderRadius:99,border:'1px dashed var(--border)',cursor:'pointer',userSelect:'none',flexShrink:0}}>Variable</span>
            )}
          </div>
        </div>
        <button onClick={()=>setBudgetOpen(true)} style={{background:'none',border:'1.5px solid var(--border)',borderRadius:8,padding:'6px 12px',cursor:'pointer',color:'var(--text)',fontSize:13,fontWeight:500,whiteSpace:'nowrap'}}>Edit Budget</button>
      </div>

      <div style={{padding:'18px 18px 80px'}}>
        {/* Summary card */}
        <div style={{background:'var(--surface)',borderRadius:14,padding:20,marginBottom:16,borderTop:`4px solid ${statusColor}`,boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:14}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>Spent</div>
              <div style={{fontSize:30,fontWeight:700,lineHeight:1}}>{fmt(spent)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>Budget</div>
              <div style={{fontSize:30,fontWeight:700,lineHeight:1}}>{fmt(cat.budget)}</div>
            </div>
          </div>
          <ProgressBar pct={pct} color={color}/>
          <div style={{marginTop:10,textAlign:'center',fontSize:14,fontWeight:600,color: remaining<0?'var(--danger)':pct>=w?'var(--warning)':'var(--success)'}}>
            {remaining>=0 ? `${fmtAbs(remaining)} remaining` : `${fmtAbs(remaining)} over budget`}
          </div>
        </div>

        {/* Transactions header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style={{fontSize:15,fontWeight:700}}>Transactions <span style={{fontWeight:400,color:'var(--text2)',fontSize:13}}>({entries.length})</span></h3>
          <button onClick={()=>setAddOpen(true)} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:600}}>+ Add</button>
        </div>

        {entries.length===0
          ? <div style={{textAlign:'center',padding:'48px 0',color:'var(--text2)',fontSize:14}}>No transactions yet. Tap "+ Add" to log one.</div>
          : <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[...entries].reverse().map(e=>(
                <div key={e.id} style={{background:'var(--surface)',borderRadius:11,padding:'13px 15px',display:'flex',alignItems:'center',gap:12,boxShadow:'var(--shadow)'}}>
                  <div style={{width:8,height:8,borderRadius:99,background:color,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:500,fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.place}</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{e.date}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:16}}>{fmt(e.amount)}</div>
                  <button onClick={()=>onDeleteEntry(e.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:20,lineHeight:1,padding:'0 2px',flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
        }
      </div>

      {/* Add transaction modal */}
      {addOpen && (
        <Modal title="Add Transaction" onClose={()=>setAddOpen(false)}>
          <Field label="Where / Description">
            <TextInput autoFocus placeholder="e.g. Lidl, Amazon, Edeka…" value={place} onChange={e=>setPlace(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
          </Field>
          <Field label="Amount (€)">
            <TextInput type="number" placeholder="0.00" min="0" step="0.01" value={amount} onChange={e=>setAmount(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
          </Field>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <Btn variant="ghost" onClick={()=>setAddOpen(false)} style={{flex:1}}>Cancel</Btn>
            <Btn onClick={handleAdd} style={{flex:1}}>Add</Btn>
          </div>
        </Modal>
      )}

      {/* Edit budget modal */}
      {budgetOpen && (
        <Modal title="Edit Budget" onClose={()=>setBudgetOpen(false)}>
          <Field label="Monthly Budget (€)">
            <TextInput autoFocus type="number" min="0" step="0.01" value={newBudget} onChange={e=>setNewBudget(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleBudget()}/>
          </Field>
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:18,fontSize:14}}>
            <input type="checkbox" checked={cat.isFixed} onChange={()=>onToggleFixed(cat.id)} style={{width:16,height:16}}/>
            Mark as fixed subscription (🔒)
          </label>
          <div style={{display:'flex',gap:10}}>
            <Btn variant="ghost" onClick={()=>setBudgetOpen(false)} style={{flex:1}}>Cancel</Btn>
            <Btn onClick={handleBudget} style={{flex:1}}>Save</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────
function Dashboard({ data, mk, onSelectCat, onAddCat, onUpdateBudget, onToggleFixed }) {
  const [addOpen, setAddOpen] = useState(false);
  const [newName, setNewName] = useState('');
  const [newBudget, setNewBudget] = useState('');
  const [newFixed, setNewFixed] = useState(false);
  const [search, setSearch] = useState('');

  const monthEntries = data.entries[mk] || {};
  const totalBudget = data.categories.reduce((s,c)=>s+c.budget,0);
  const totalSpent  = data.categories.reduce((s,c)=>s+sumEntries(monthEntries[c.id]),0);
  const totalPct    = totalBudget>0 ? (totalSpent/totalBudget)*100 : 0;
  const remaining   = totalBudget - totalSpent;
  const w = window.__warnThreshold || 80;

  const handleAdd = () => {
    if (!newName.trim()) return;
    onAddCat({ id:`cat_${Date.now()}`, name:newName.trim(), budget:parseFloat(newBudget)||0, isFixed:newFixed, ci: Math.floor(Math.random()*PALETTE.length) });
    setNewName(''); setNewBudget(''); setNewFixed(false); setAddOpen(false);
  };

  const filtered = data.categories.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const overCount = filtered.filter(c=>{ const p=sumEntries(monthEntries[c.id]); return c.budget>0&&p>=c.budget; }).length;

  return (
    <div style={{padding:'0 0 80px'}}>
      {/* Summary strip */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,padding:'16px 16px 0'}}>
        {[
          {label:'BUDGET', val:fmt(totalBudget), sub:'this month', clr:'var(--text)'},
          {label:'SPENT',  val:fmt(totalSpent),  sub:`${totalPct.toFixed(0)}% used`, clr: totalPct>=100?'var(--danger)':totalPct>=w?'var(--warning)':'var(--text)'},
          {label:'LEFT',   val:fmtAbs(remaining),sub:remaining<0?'over budget':'remaining', clr:remaining<0?'var(--danger)':'var(--success)'},
        ].map(({label,val,sub,clr})=>(
          <div key={label} style={{background:'var(--surface)',borderRadius:13,padding:'14px 12px',boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:4,letterSpacing:'.06em',textTransform:'uppercase'}}>{label}</div>
            <div style={{fontSize:18,fontWeight:700,color:clr,lineHeight:1,marginBottom:3}}>{val}</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* Overall progress */}
      <div style={{padding:'10px 16px 0'}}>
        <div style={{background:'var(--surface)',borderRadius:13,padding:'14px 16px',boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:600}}>Monthly Overview</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {overCount>0&&<span style={{fontSize:11,background:'var(--danger)',color:'#fff',padding:'2px 8px',borderRadius:99,fontWeight:700}}>{overCount} over budget</span>}
              <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>{totalPct.toFixed(0)}%</span>
            </div>
          </div>
          <ProgressBar pct={totalPct}/>
        </div>
      </div>

      {/* Chart */}
      <div style={{padding:'10px 16px 0'}}>
        <div style={{background:'var(--surface)',borderRadius:13,padding:'16px',boxShadow:'var(--shadow)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:13,letterSpacing:'.06em',textTransform:'uppercase'}}>Spending Breakdown</div>
          <DonutChart categories={data.categories} monthEntries={monthEntries}/>
        </div>
      </div>

      {/* Category list */}
      <div style={{padding:'16px 16px 0'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700}}>Categories <span style={{fontWeight:400,color:'var(--text2)',fontSize:13}}>({data.categories.length})</span></h2>
          <button onClick={()=>setAddOpen(true)} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:9,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:600}}>+ New</button>
        </div>

        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search categories…"
          style={{width:'100%',padding:'9px 13px',border:'1.5px solid var(--border)',borderRadius:9,background:'var(--bg)',color:'var(--text)',fontSize:14,marginBottom:10,fontFamily:'inherit'}}/>

        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(cat=>{
            const es = monthEntries[cat.id]||[];
            const spent = sumEntries(es);
            const pct = cat.budget>0?(spent/cat.budget)*100:0;
            const color = PALETTE[cat.ci%PALETTE.length];
            const isOver = cat.budget>0 && pct>=100;
            const isWarn = cat.budget>0 && pct>=w && pct<100;
            return (
              <div key={cat.id} onClick={()=>onSelectCat(cat)}
                style={{background:'var(--surface)',borderRadius:12,padding:'13px 15px',cursor:'pointer',borderLeft:`4px solid ${color}`,boxShadow:'var(--shadow)',transition:'transform .12s'}
                }
                onMouseEnter={e=>e.currentTarget.style.transform='translateX(3px)'}
                onMouseLeave={e=>e.currentTarget.style.transform=''}
              >
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
                  <span style={{fontWeight:600,flex:1,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.name}</span>
                  {cat.isFixed && <span style={{fontSize:11,opacity:.6}}>🔒</span>}
                  {isOver && <span style={{fontSize:11,background:'var(--danger)',color:'#fff',padding:'2px 7px',borderRadius:99,fontWeight:700,flexShrink:0}}>OVER</span>}
                  {isWarn && <span style={{fontSize:11,background:'var(--warning)',color:'#fff',padding:'2px 7px',borderRadius:99,fontWeight:700,flexShrink:0}}>!</span>}
                </div>
                <ProgressBar pct={pct} color={color}/>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12,color:'var(--text2)'}}>
                  <span style={{fontWeight:500,color:'var(--text)'}}>{fmt(spent)}</span>
                  <span>of {fmt(cat.budget)}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Add category modal */}
      {addOpen && (
        <Modal title="New Category" onClose={()=>setAddOpen(false)}>
          <Field label="Category Name">
            <TextInput autoFocus placeholder="e.g. Gym, Dining Out…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
          </Field>
          <Field label="Monthly Budget (€)">
            <TextInput type="number" min="0" step="0.01" placeholder="0.00" value={newBudget} onChange={e=>setNewBudget(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
          </Field>
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:18,fontSize:14}}>
            <input type="checkbox" checked={newFixed} onChange={e=>setNewFixed(e.target.checked)} style={{width:16,height:16}}/>
            Fixed subscription (🔒)
          </label>
          <div style={{display:'flex',gap:10}}>
            <Btn variant="ghost" onClick={()=>setAddOpen(false)} style={{flex:1}}>Cancel</Btn>
            <Btn onClick={handleAdd} style={{flex:1}}>Create</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Month Picker ──────────────────────────────────────────────
function MonthPicker({ year, month, onChange }) {
  const [open, setOpen] = useState(false);
  const [pickYear, setPickYear] = useState(year);
  const ref = useRef();

  useEffect(()=>{
    const fn = e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',fn);
    return ()=>document.removeEventListener('mousedown',fn);
  },[]);

  return (
    <div ref={ref} style={{position:'relative'}}>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <button onClick={()=>onChange(month===1?{year:year-1,month:12}:{year,month:month-1})}
          style={{background:'none',border:'1.5px solid var(--border)',borderRadius:7,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text)',fontSize:15}}>‹</button>
        <button onClick={()=>{setPickYear(year);setOpen(v=>!v)}}
          style={{background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:9,padding:'5px 13px',cursor:'pointer',color:'var(--text)',fontFamily:'inherit',fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>
          {MONTHS[month-1].slice(0,3)} {year}
        </button>
        <button onClick={()=>onChange(month===12?{year:year+1,month:1}:{year,month:month+1})}
          style={{background:'none',border:'1.5px solid var(--border)',borderRadius:7,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text)',fontSize:15}}>›</button>
      </div>
      {open && (
        <div style={{position:'absolute',top:'110%',left:'50%',transform:'translateX(-50%)',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:14,padding:14,boxShadow:'0 8px 32px rgba(0,0,0,.22)',zIndex:500,width:260}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <button onClick={()=>setPickYear(y=>y-1)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--accent)',fontSize:18,padding:'0 6px'}}>‹</button>
            <span style={{fontWeight:700,fontSize:14}}>{pickYear}</span>
            <button onClick={()=>setPickYear(y=>y+1)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--accent)',fontSize:18,padding:'0 6px'}}>›</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5}}>
            {MONTHS.map((m,i)=>{
              const sel = pickYear===year && (i+1)===month;
              return (
                <button key={m} onClick={()=>{ onChange({year:pickYear,month:i+1}); setOpen(false); }}
                  style={{padding:'7px 4px',borderRadius:8,border:'none',cursor:'pointer',background:sel?'var(--accent)':'var(--bg2)',color:sel?'#fff':'var(--text)',fontFamily:'inherit',fontSize:12,fontWeight:sel?700:400}}>
                  {m.slice(0,3)}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sync helpers ──────────────────────────────────────────────
async function cloudPull(url) {
  const res = await fetch(url, { redirect: 'follow' });
  const txt = await res.text();
  return JSON.parse(txt);
}

async function cloudPush(url, data) {
  const body = new URLSearchParams({ data: JSON.stringify(data) });
  const res = await fetch(url, { method: 'POST', body, redirect: 'follow' });
  const txt = await res.text();
  return JSON.parse(txt);
}

// ─── Sync Settings Modal ───────────────────────────────────────
function SyncModal({ syncUrl, onSave, onClose, syncStatus, lastSynced, onSyncNow }) {
  const [url, setUrl] = useState(syncUrl || '');
  const statusColor = { idle:'var(--text2)', syncing:'var(--warning)', ok:'var(--success)', error:'var(--danger)' };
  const statusLabel = { idle:'Not synced yet', syncing:'Syncing…', ok:`Synced ${lastSynced}`, error:'Sync failed — check URL' };
  return (
    <Modal title="☁️ Google Sheets Sync" onClose={onClose} width={440}>
      <div style={{fontSize:13,color:'var(--text2)',marginBottom:16,lineHeight:1.6}}>
        Paste your <strong style={{color:'var(--text)'}}>Google Apps Script Web App URL</strong> below.
        Your data will automatically sync across all devices using a private Google Sheet.<br/>
        <a href="google-apps-script.js" download style={{color:'var(--accent)',fontWeight:600,marginTop:4,display:'inline-block'}}>⬇ Download Apps Script code</a>
      </div>

      {/* Status pill */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'9px 13px',background:'var(--bg2)',borderRadius:9}}>
        <div style={{width:8,height:8,borderRadius:99,background:statusColor[syncStatus],flexShrink:0,
          animation: syncStatus==='syncing'?'pulse 1s infinite':undefined}}/>
        <span style={{fontSize:13,color:statusColor[syncStatus],fontWeight:500}}>{statusLabel[syncStatus]}</span>
      </div>

      <Field label="Apps Script URL">
        <TextInput
          placeholder="https://script.google.com/macros/s/…/exec"
          value={url} onChange={e=>setUrl(e.target.value)}
          style={{fontSize:13}}
        />
      </Field>

      <div style={{display:'flex',gap:10,marginTop:4}}>
        <Btn variant="ghost" onClick={onClose} style={{flex:1}}>Cancel</Btn>
        <Btn variant="ghost" onClick={()=>onSyncNow(url)} style={{flex:1}} disabled={!url.trim()}>Sync Now</Btn>
        <Btn onClick={()=>{ onSave(url); onClose(); }} style={{flex:1}}>Save</Btn>
      </div>

      <div style={{marginTop:16,padding:'12px 14px',background:'var(--bg2)',borderRadius:9,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
        <strong style={{color:'var(--text)'}}>Quick setup (2 min):</strong><br/>
        1. Go to <a href="https://script.google.com" target="_blank" style={{color:'var(--accent)'}}>script.google.com</a> → New project<br/>
        2. Paste the downloaded script → Deploy as Web App<br/>
        3. Execute as: <em>Me</em> · Access: <em>Anyone</em><br/>
        4. Copy the URL → paste above → Save
      </div>
    </Modal>
  );
}

// ─── App root ──────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(loadData);
  const [theme, setTheme] = useState(()=>localStorage.getItem(THEME_KEY)||'light');
  const now = new Date();
  const [ym, setYm] = useState(()=>{
    try { const s=localStorage.getItem(MONTH_KEY); if(s) return JSON.parse(s); } catch {}
    return { year: now.getFullYear(), month: now.getMonth()+1 };
  });
  const [selectedCat, setSelectedCat] = useState(null);
  const [syncUrl, setSyncUrl] = useState(()=>localStorage.getItem(SYNC_KEY)||'');
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | error
  const [lastSynced, setLastSynced] = useState('');
  const [syncOpen, setSyncOpen] = useState(false);
  const pushTimerRef = useRef(null);

  const { year, month } = ym;
  const mk = mkKey(year, month);

  useEffect(()=>{ document.documentElement.dataset.theme=theme; localStorage.setItem(THEME_KEY,theme); },[theme]);
  useEffect(()=>{ localStorage.setItem(MONTH_KEY,JSON.stringify(ym)); },[ym]);

  // Pull from cloud on first load if URL is set
  useEffect(()=>{
    if (!syncUrl) return;
    doSync(syncUrl, data, false);
  }, []);

  const doSync = useCallback(async (url, currentData, push=true) => {
    if (!url) return;
    setSyncStatus('syncing');
    try {
      if (push) {
        const payload = { ...currentData, lastModified: Date.now() };
        const res = await cloudPush(url, payload);
        if (res.status === 'conflict' && res.data) {
          // Cloud is newer — update local
          setData(res.data);
          saveData(res.data);
        }
      } else {
        const cloud = await cloudPull(url);
        if (cloud && cloud.categories) {
          const localTime = currentData.lastModified || 0;
          const cloudTime = cloud.lastModified || 0;
          if (cloudTime > localTime) {
            setData(cloud);
            saveData(cloud);
          }
        }
      }
      setSyncStatus('ok');
      setLastSynced(new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
    } catch (e) {
      setSyncStatus('error');
    }
  }, []);

  const mutate = fn => {
    setData(prev => {
      const next = fn({...prev, categories:[...prev.categories], entries:{...prev.entries}, lastModified: Date.now()});
      saveData(next);
      // Debounced push to cloud
      if (syncUrl) {
        clearTimeout(pushTimerRef.current);
        pushTimerRef.current = setTimeout(()=>doSync(syncUrl, next, true), 1500);
      }
      return next;
    });
  };

  const handleSaveSync = url => {
    setSyncUrl(url);
    localStorage.setItem(SYNC_KEY, url);
    if (url) doSync(url, data, false);
  };

  const addEntry = (catId, entry) => mutate(d=>({
    ...d, entries:{ ...d.entries, [mk]:{ ...(d.entries[mk]||{}), [catId]:[...(d.entries[mk]?.[catId]||[]), entry] } }
  }));
  const delEntry = (catId, entryId) => mutate(d=>({
    ...d, entries:{ ...d.entries, [mk]:{ ...(d.entries[mk]||{}), [catId]:(d.entries[mk]?.[catId]||[]).filter(e=>e.id!==entryId) } }
  }));
  const updBudget = (catId, budget) => mutate(d=>({ ...d, categories:d.categories.map(c=>c.id===catId?{...c,budget}:c) }));
  const togFixed  = (catId) => mutate(d=>({ ...d, categories:d.categories.map(c=>c.id===catId?{...c,isFixed:!c.isFixed}:c) }));
  const addCat    = (cat) => mutate(d=>({ ...d, categories:[...d.categories, cat] }));

  const syncDot = { idle: syncUrl ? '#f59e0b' : 'var(--border)', syncing: '#f59e0b', ok: '#10b981', error: '#ef4444' };

  if (selectedCat) {
    const cat = data.categories.find(c=>c.id===selectedCat.id) || selectedCat;
    const entries = (data.entries[mk]||{})[cat.id]||[];
    return (
      <div style={{maxWidth:480,margin:'0 auto'}}>
        <CategoryDetail
          cat={cat} entries={entries}
          onBack={()=>setSelectedCat(null)}
          onAddEntry={e=>addEntry(cat.id,e)}
          onDeleteEntry={id=>delEntry(cat.id,id)}
          onUpdateBudget={updBudget}
          onToggleFixed={togFixed}
        />
      </div>
    );
  }

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh'}}>
      {/* Header */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'13px 18px',position:'sticky',top:0,zIndex:100,boxShadow:'var(--shadow)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
          {/* Sync button */}
          <button onClick={()=>setSyncOpen(true)} title="Sync settings"
            style={{background:'none',border:'1.5px solid var(--border)',borderRadius:8,width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,position:'relative'}}>
            ☁️
            <div style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:99,background:syncDot[syncStatus],border:'1.5px solid var(--surface)',
              animation: syncStatus==='syncing'?'spin 1s linear infinite':undefined}}/>
          </button>
          <MonthPicker year={year} month={month} onChange={setYm}/>
          <button onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}
            style={{background:'none',border:'1.5px solid var(--border)',borderRadius:8,width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>
            {theme==='dark'?'☀️':'🌙'}
          </button>
        </div>
      </div>

      <Dashboard
        data={data} mk={mk}
        onSelectCat={setSelectedCat}
        onAddCat={addCat}
        onUpdateBudget={updBudget}
        onToggleFixed={togFixed}
      />

      {syncOpen && (
        <SyncModal
          syncUrl={syncUrl}
          syncStatus={syncStatus}
          lastSynced={lastSynced}
          onSave={handleSaveSync}
          onClose={()=>setSyncOpen(false)}
          onSyncNow={url=>{ handleSaveSync(url); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
